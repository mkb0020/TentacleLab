<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>🐙 Tentacle Lab</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    html, body {
      width: 100%; height: 100%;
      overflow: hidden;
      background: #050012;
    }

    #canvas {
      display: block;
      width: 100vw;
      height: 100vh;
      cursor: default;
    }

    #canvas { touch-action: none; }
  </style>
  <link rel="stylesheet" href="assets/css/styles.css">
</head>
<body>
  <canvas id="canvas"></canvas>
  <div id="tlab-toast"></div>
  <!--
    Native ES modules — no build step needed.
    Run with any static file server, e.g.:
      npx serve .
      python -m http.server 8080
      VS Code Live Server
    NOTE: Opening index.html directly as file:// will block ES module imports.
  -->
  <script type="module" src="js/main.js"></script>
</body>
</html>
